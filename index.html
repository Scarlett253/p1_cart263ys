<body>
  <link rel="stylesheet" href="css/style.css" />

  <!-- Title Screen -->
  <div id="start-screen">
    <h1 id="game-title">Can you see me?</h1>

    <p id="instructions">
      Player 1: use W A S D to move.<br />
      Player 2: use the arrow keys to move.<br /><br />
      Find the hidden presence before time runs out.
    </p>

    <button id="start-btn">Start</button>
    <p id="credits">Made by Yelena & Scarlett</p>
  </div>

  <!-- Game Area -->
  <div id="game-container">
    <div id="avatar-player" class="player avatar1 lost"></div>
    <div id="avatar-hidden" class="player avatar2 lost"></div>

    <video id="game-bg-video" autoplay loop muted playsinline>
      <source src="images/GameBackground.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- UI Area -->
  <div id="ui">
    <p id="message">Find the hidden presence.</p>
    <p id="timer">Time: 60</p>
    <button id="restart-btn">Start again</button>
  </div>

  <!-- Wavy filter (needed for dress wave) -->
  <svg width="0" height="0" style="position: absolute">
    <filter id="wavy">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.02"
        numOctaves="2"
        seed="2"
      >
        <animate
          attributeName="baseFrequency"
          dur="2.5s"
          values="0.02;0.03;0.02"
          repeatCount="indefinite"
        ></animate>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="18"></feDisplacementMap>
    </filter>
  </svg>

  <script src="js/script.js"></script>
</body>
