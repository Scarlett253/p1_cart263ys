<body>
  <link rel="stylesheet" href="css/style.css" />

  <!-- Title Screen -->
  <div id="start-screen">
    <video id="start-bg-video" autoplay loop muted playsinline>
      <source src="images/Background.mp4" type="video/mp4" />
    </video>
    <h1 id="game-title">Can you see me?</h1>

    <p id="subtitle">Find the hidden presence.</p>

    <p id="instructions">
      Player 1: use W A S D to move.<br />
      Player 2: use the arrow keys to move.<br /><br />
    </p>

    <div id="start-wrapper">
      <img id="start-btn" src="images/startButton.gif" alt="Start Game" />
      <p id="start-text">CLICK THE MOON TO BEGIN YOUR JOURNEY</p>
    </div>
    <p id="credits">Made by Yelena & Scarlett</p>
  </div>

  <!-- Game Area -->
  <div id="game-container">
    <div id="avatar-player" class="player avatar1 lost"></div>
    <div id="avatar-hidden" class="player avatar2 lost"></div>

    <video id="game-bg-video" autoplay loop muted playsinline>
      <source src="images/GameBackground.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- UI Area -->
  <div id="ui">
    <p id="message">Find the hidden presence.</p>
    <p id="timer">Time: 60</p>
    <img id="restart-btn" src="images/rtnbutton.gif" alt="Restart" />
  </div>
  <audio id="bg-music" loop>
    <source src="sound/music.mp3" type="audio/mpeg" />
  </audio>
  <script src="js/script.js"></script>
</body>
